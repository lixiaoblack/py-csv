name: Build iTalent Crawler

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: iTalent考勤爬虫.exe
            asset_name: iTalent考勤爬虫-Windows.exe
          - os: macos-latest
            artifact_name: iTalent考勤爬虫
            asset_name: iTalent考勤爬虫-macOS
          - os: ubuntu-latest
            artifact_name: iTalent考勤爬虫
            asset_name: iTalent考勤爬虫-Linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests

    - name: Build with PyInstaller
      run: |
        pyinstaller italent_crawler.py --name iTalent考勤爬虫 --onefile --console --clean --noconfirm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          iTalent 考勤爬虫工具
          
          ## 使用方法
          1. 下载对应平台的可执行文件
          2. 运行程序，按提示输入 Cookie 和 quark_s
          3. 等待爬取完成，生成 CSV 文件
          
          ## 文件说明
          - Windows: iTalent考勤爬虫-Windows.exe
          - macOS: iTalent考勤爬虫-macOS
          - Linux: iTalent考勤爬虫-Linux
        files: |
          artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

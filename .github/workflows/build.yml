name: Build iTalent Crawler

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: italent-crawler.exe
            asset_name: italent-crawler-windows.exe
          - os: macos-latest
            artifact_name: italent-crawler
            asset_name: italent-crawler-macos
          - os: ubuntu-latest
            artifact_name: italent-crawler
            asset_name: italent-crawler-linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests

    - name: Build with PyInstaller
      run: |
        pyinstaller italent_crawler.py --name italent-crawler --onefile --console --clean --noconfirm

    - name: Rename artifact
      shell: bash
      run: |
        mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: italent-crawler-windows.exe
        path: ./release

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: italent-crawler-macos
        path: ./release

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: italent-crawler-linux
        path: ./release

    - name: List files
      run: ls -la ./release

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          iTalent Attendance Crawler
          
          ## Usage
          1. Download the executable for your platform
          2. Run the program and enter Cookie & quark_s
          3. Wait for the crawl to complete, CSV files will be generated
          
          ## Files
          - Windows: italent-crawler-windows.exe
          - macOS: italent-crawler-macos
          - Linux: italent-crawler-linux
        files: release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
